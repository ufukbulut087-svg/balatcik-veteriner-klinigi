backend:
  name: github
  repo: ufukbulut087-svg/balatcik-veteriner-klinigi
  branch: main
  base_url: https://balatcik-veteriner-klinigi.vercel.app
  auth_endpoint: api/auth

media_folder: "assets"
public_folder: "assets"

collections:
  - name: "about"
    label: "Hakkımızda"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/about.json"
        label: "Hakkımızda Metinleri"
        name: "about_content"
        fields:
          - { label: "Misyonumuz", name: "mission", widget: "text" }
          - { label: "Vizyonumuz", name: "vision", widget: "text" }

  - name: "services"
    label: "Hizmetlerimiz"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/services.json"
        label: "Hizmet Listesi"
        name: "services_list"
        fields:
          - label: "Hizmetler"
            name: "services"
            widget: "list"
            fields:
              - { label: "Hizmet Kimliği (surgery, internal, laboratory, hotel, haircut, acupuncture)", name: "id", widget: "string" }
              - { label: "İkon Sınıfı (Örn: surgery, internal)", name: "icon", widget: "string" }
              - { label: "Hizmet Adı", name: "title", widget: "string" }
              - { label: "Kısa Açıklama", name: "description", widget: "string" }
              - { label: "Detay Bağlantısı (Örn: #iletisim veya #akupunkturModal)", name: "detailsLink", widget: "string", required: false }

  - name: "team"
    label: "Ekibimiz"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/team.json"
        label: "Ekip Üyeleri"
        name: "team_list"
        fields:
          - label: "Üyeler"
            name: "members"
            widget: "list"
            fields:
              - { label: "Ad Soyad", name: "name", widget: "string" }
              - { label: "Ünvan", name: "role", widget: "string" }
              - { label: "Fotoğraf", name: "photo", widget: "image" }
              - { label: "Kısa Biyografi", name: "bio", widget: "text" }

  - name: "faq"
    label: "Sık Sorulan Sorular"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/faq.json"
        label: "Sorular ve Cevaplar"
        name: "faq_list"
        fields:
          - label: "Sorular"
            name: "questions"
            widget: "list"
            fields:
              - { label: "Soru", name: "question", widget: "string" }
              - { label: "Cevap", name: "answer", widget: "text" }

  - name: "gallery"
    label: "Galeri"
    delete: false
    editor:
      preview: false
    files:
      - file: "data/gallery.json"
        label: "Galeri Görselleri"
        name: "gallery_images"
        fields:
          - label: "Fotoğraflar"
            name: "images"
            widget: "list"
            fields:
              - { label: "Görsel", name: "image", widget: "image" }
              - { label: "Açıklama (Alt Text)", name: "alt", widget: "string", required: false }
